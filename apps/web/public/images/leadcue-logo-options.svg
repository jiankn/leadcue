<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">LeadCue SVG logo options</title>
  <desc id="desc">Five LeadCue logo concepts for review.</desc>
  <defs>
    <linearGradient id="limeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8FF86"/>
      <stop offset="1" stop-color="#7CF25E"/>
    </linearGradient>
    <linearGradient id="mintFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9FFE1"/>
      <stop offset="1" stop-color="#9CFF78"/>
    </linearGradient>
    <linearGradient id="darkFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#075648"/>
      <stop offset="1" stop-color="#002F29"/>
    </linearGradient>
    <style>
      .bg { fill: #EEFBEA; }
      .panel { fill: #FBFFF7; stroke: #CFE6C9; }
      .panel-dark { fill: #003F36; stroke: rgba(156,255,120,0.16); }
      .label { fill: #006252; font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 0; }
      .note { fill: #44665F; font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0; }
      .word { fill: #073F37; font-family: Inter, Arial, sans-serif; font-size: 36px; font-weight: 850; letter-spacing: 0; }
      .word-light { fill: #FFFFFF; font-family: Inter, Arial, sans-serif; font-size: 36px; font-weight: 850; letter-spacing: 0; }
      .small-word { fill: #073F37; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 850; letter-spacing: 0; }
      .small-word-light { fill: #FFFFFF; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 850; letter-spacing: 0; }
      .ink { stroke: #003F36; }
      .paper { stroke: #FBFFF7; }
      .accent { stroke: #9CFF78; }
      .amber { stroke: #E9B949; }
      .muted { stroke: #6A8A82; }
      .thin { stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thick { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="900"/>
  <g opacity="0.42">
    <path d="M0 120H1280M0 220H1280M0 320H1280M0 420H1280M0 520H1280M0 620H1280M0 720H1280M0 820H1280" stroke="#D8EFD2"/>
    <path d="M80 0V900M180 0V900M280 0V900M380 0V900M480 0V900M580 0V900M680 0V900M780 0V900M880 0V900M980 0V900M1080 0V900M1180 0V900" stroke="#D8EFD2"/>
  </g>

  <text x="64" y="76" fill="#003F36" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="0">LeadCue logo directions</text>
  <text x="64" y="108" fill="#44665F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="650" letter-spacing="0">Built from the product idea: website evidence becomes ranked, export-ready sales cues.</text>

  <g transform="translate(64 150)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">A. Cue Lens</text>
    <text class="note" x="22" y="58">Research lens + exact sales cue.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#limeFill)"/>
      <path class="thick ink" d="M38 24a12 12 0 1 0 0 20"/>
      <path class="thick ink" d="M38 44l11 11"/>
      <circle cx="24" cy="31" r="3.8" fill="#003F36"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#limeFill)"/>
        <path class="thick ink" d="M29 18a9 9 0 1 0 0 15"/>
        <path class="thick ink" d="M29 33l8 8"/>
        <circle cx="18" cy="24" r="3" fill="#003F36"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(460 150)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">B. Signal Mark</text>
    <text class="note" x="22" y="58">Website signal detected and qualified.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#darkFill)"/>
      <path class="thick accent" d="M17 41V18"/>
      <path class="thick accent" d="M17 41h23"/>
      <path class="thin paper" d="M30 20c9 2 14 8 16 17"/>
      <path class="thin paper" d="M30 29c4 1 7 4 8 8"/>
      <circle cx="46" cy="42" r="4" fill="#9CFF78"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#darkFill)"/>
        <path class="thick accent" d="M13 31V14"/>
        <path class="thick accent" d="M13 31h18"/>
        <path class="thin paper" d="M23 15c7 2 11 6 12 13"/>
        <circle cx="35" cy="32" r="3" fill="#9CFF78"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(856 150)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">C. Ranked Pipeline</text>
    <text class="note" x="22" y="58">Messy research becomes ranked accounts.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#limeFill)"/>
      <path class="thick ink" d="M17 18h23"/>
      <path class="thick ink" d="M17 29h18"/>
      <path class="thick ink" d="M17 40h12"/>
      <path class="thin ink" d="M40 41l7-7 7 7"/>
      <path class="thin ink" d="M47 34v16"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#limeFill)"/>
        <path class="thick ink" d="M12 15h18"/>
        <path class="thick ink" d="M12 23h14"/>
        <path class="thick ink" d="M12 31h9"/>
        <path class="thin ink" d="M31 31l5-5 5 5"/>
        <path class="thin ink" d="M36 26v12"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(64 400)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">D. Cursor Cue</text>
    <text class="note" x="22" y="58">Chrome action: click, scan, capture context.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#mintFill)"/>
      <path d="M18 14l24 26-13 2-6 12-5-40z" fill="#003F36"/>
      <path class="thin amber" d="M39 15l3-7M45 21l7-4M45 29h8"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#mintFill)"/>
        <path d="M14 10l19 21-10 2-5 10-4-33z" fill="#003F36"/>
        <path class="thin amber" d="M31 12l3-6M35 17l6-3"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(460 400)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">E. Evidence Cards</text>
    <text class="note" x="22" y="58">Source-backed prospect cards, not contact spam.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#darkFill)"/>
      <rect x="13" y="15" width="14" height="14" fill="#9CFF78"/>
      <rect x="31" y="15" width="14" height="14" fill="#E9FFE1"/>
      <rect x="13" y="33" width="14" height="14" fill="#E9FFE1"/>
      <path class="thick accent" d="M32 42h14"/>
      <path class="thin paper" d="M20 22c9 8 16 12 26 18"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#darkFill)"/>
        <rect x="10" y="12" width="11" height="11" fill="#9CFF78"/>
        <rect x="24" y="12" width="11" height="11" fill="#E9FFE1"/>
        <rect x="10" y="26" width="11" height="11" fill="#E9FFE1"/>
        <path class="thick accent" d="M24 34h11"/>
        <path class="thin paper" d="M16 17c7 7 12 10 20 15"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(856 400)">
    <rect class="panel" width="360" height="200"/>
    <text class="label" x="22" y="34">F. Cue Check</text>
    <text class="note" x="22" y="58">Fast visual shorthand for qualified evidence.</text>
    <g transform="translate(28 82)">
      <rect width="58" height="58" rx="12" fill="url(#limeFill)"/>
      <path class="thick ink" d="M18 22h22"/>
      <path class="thick ink" d="M18 34h16"/>
      <path class="thick ink" d="M18 46h10"/>
      <path class="thick ink" d="M36 39l6 6 13-17"/>
      <circle cx="45" cy="20" r="4" fill="#003F36"/>
      <text class="word" x="76" y="42">LeadCue</text>
    </g>
    <g transform="translate(28 154)">
      <rect class="panel-dark" width="216" height="38"/>
      <g transform="translate(12 7) scale(0.54)">
        <rect width="44" height="44" rx="10" fill="url(#limeFill)"/>
        <path class="thick ink" d="M12 16h17"/>
        <path class="thick ink" d="M12 25h12"/>
        <path class="thick ink" d="M27 30l5 5 10-15"/>
        <circle cx="35" cy="15" r="3" fill="#003F36"/>
      </g>
      <text class="small-word-light" x="46" y="27">LeadCue</text>
    </g>
  </g>

  <g transform="translate(64 690)">
    <rect class="panel-dark" width="1152" height="130"/>
    <text x="28" y="42" fill="#9CFF78" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" letter-spacing="0">Navigation/footer usage check</text>
    <text x="28" y="72" fill="#DDF7D6" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650" letter-spacing="0">Each option includes a 44px-ish dark-nav treatment. After you choose one, I will replace the nav and footer with the same reusable SVG mark.</text>
    <text x="28" y="106" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0">My product recommendation: A for sharp prospecting clarity, C for pipeline value, E for trust/source-backed positioning.</text>
  </g>
</svg>
